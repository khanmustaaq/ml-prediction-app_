<!DOCTYPE html>
<html>

<head>
    <title>Churn Prediction App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Churn Prediction App</h1>
        <div class="row justify-content-center g-4">
            <div class="col-md-4">
                <div class="card text-center shadow">
                    <div class="card-body p-4">
                        <h4 class="card-title">Telecom</h4>
                        <p class="card-text">Predict if a telecom customer will churn.</p>
                        <a href="/telecom" class="btn btn-primary">Go</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center shadow">
                    <div class="card-body p-4">
                        <h4 class="card-title">Healthcare</h4>
                        <p class="card-text">Predict patient surgery outcome.</p>
                        <a href="/healthcare" class="btn btn-success">Go</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center shadow">
                    <div class="card-body p-4">
                        <h4 class="card-title">E-Commerce</h4>
                        <p class="card-text">Predict order status.</p>
                        <a href="/ecommerce" class="btn btn-warning">Go</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
