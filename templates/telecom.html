<!DOCTYPE html>
<html>

<head>
    <title>Telecom Churn Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-4" style="max-width:600px">
        <h2 class="mb-4">Telecom Churn Prediction</h2>
        <a href="/" class="btn btn-secondary btn-sm mb-3">← Back</a>
        <form method="POST" class="card p-4 shadow">
            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-select" required>
                    <option value="0">Female</option>
                    <option value="1">Male</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Partner</label>
                <select name="partner" class="form-select" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Dependents</label>
                <select name="dependents" class="form-select" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Tenure (months)</label>
                <input type="number" name="tenure" class="form-control" min="0" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Online Security</label>
                <select name="online_security" class="form-select" required>
                    <option value="0">No</option>
                    <option value="1">No Internet Service</option>
                    <option value="2">Yes</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Online Backup</label>
                <select name="online_backup" class="form-select" required>
                    <option value="0">No</option>
                    <option value="1">No Internet Service</option>
                    <option value="2">Yes</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Device Protection</label>
                <select name="device_protection" class="form-select" required>
                    <option value="0">No</option>
                    <option value="1">No Internet Service</option>
                    <option value="2">Yes</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Tech Support</label>
                <select name="tech_support" class="form-select" required>
                    <option value="0">No</option>
                    <option value="1">No Internet Service</option>
                    <option value="2">Yes</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Contract</label>
                <select name="contract" class="form-select" required>
                    <option value="0">Month-to-month</option>
                    <option value="1">One year</option>
                    <option value="2">Two year</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Monthly Charges ($)</label>
                <input type="number" step="0.01" name="monthly_charges" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Predict</button>
        </form>
        {% if result %}
        <div class="alert alert-info mt-4 text-center fs-5">{{ result }}</div>
        {% endif %}
    </div>
</body>

</html>
